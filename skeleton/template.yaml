apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: ${{values.name}}
  title: ${{values.name}}
  description: ${{values.name}}
  tags:
    - recommended
spec:
  owner: development
  type: service

  parameters:
    - title: Fill in some steps
      required:
        - component_id
        - environment
      properties:
        component_id:
          title: Component name
          type: string
          description: Provide a component (microservice) name
          pattern: '^([a-zA-Z][a-zA-Z0-9]*)(-[a-zA-Z0-9]+)*$'
        environment:
          title: Environment
          type: string
          description: The environment where this component will be deployed
          enum:
            - dev

  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./template
        values:
          app_name: ${{'$'}}{{parameters.component_id}}
          app_env: ${{'$'}}{{parameters.environment}}

    - id: publish
      name: Publish
      action: publish:github
      input:
        description: This is ${{'$'}}{{ parameters.component_id }}
        repoUrl: github.com?owner=jk7testorg&repo=${{'$'}}{{parameters.component_id}}
        protectDefaultBranch: false
        repoVisibility: public
        
    - id: debug
      name: Debug
      action: debug:log
      input:
        message: ${{'$'}}{{ steps.publish.output.repoContentsUrl }}
        
    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{'$'}}{{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: "/catalog-info.yaml"

    - id: create-k8s-folder
      name: Create K8s Folder
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=jk7testorg&repo=k8s-manifest
        branchName: create-${{'$'}}{{ parameters.component_id }}
        title: "Add manifests for ${{'$'}}{{ parameters.component_id }}"
        description: "This PR creates Kubernetes manifests for ${{'$'}}{{ parameters.component_id }}"
        sourcePath: ./manifest-templates
        targetPath: apps/${{'$'}}{{ parameters.component_id }}

  output:
    links:
      - title: Repository
        url: ${{'$'}}{{ steps['publish'].output.remoteUrl }}
